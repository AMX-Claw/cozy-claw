<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>小狐狸 Sprite Sheet 🦊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    min-height: 100vh;
  }
  h1 { color: #ff9966; margin-bottom: 4px; font-size: 24px; }
  .subtitle { color: #887; font-size: 13px; margin-bottom: 24px; }
  .main { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; align-items: start; }
  .panel { display: flex; flex-direction: column; align-items: center; }
  .panel-label { color: #ff9966; font-size: 12px; margin-bottom: 8px; letter-spacing: 1px; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
  #sheetCanvas { border: 1px solid #333; background: repeating-conic-gradient(#222 0% 25%, #2a2a3e 0% 50%) 50%/16px 16px; }
  #previewCanvas { border: 1px solid #333; background: repeating-conic-gradient(#222 0% 25%, #2a2a3e 0% 50%) 50%/16px 16px; }
  .controls { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  button {
    background: #ff9966; color: #1a1a2e; border: none;
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: background 0.2s;
  }
  button:hover { background: #ffbb88; }
  button.active { background: #ff6633; color: white; }
  .dir-buttons { display: flex; gap: 4px; }
  .dir-buttons button { padding: 8px 12px; font-size: 12px; }
  .info { color: #665; font-size: 11px; margin-top: 8px; }
  .row-labels { display: flex; flex-direction: column; justify-content: space-around; padding-right: 8px; font-size: 11px; color: #776; height: 512px; }
  .sheet-area { display: flex; align-items: stretch; }
  .speed-control { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .speed-control label { color: #887; font-size: 12px; }
  .speed-control input { width: 80px; }
</style>
</head>
<body>

<h1>🦊 小狐狸 Sprite Sheet</h1>
<div class="subtitle">32×32 · 4 directions × 4 frames · walk cycle</div>

<div class="main">
  <div class="panel">
    <div class="panel-label">SPRITE SHEET</div>
    <div class="sheet-area">
      <div class="row-labels">
        <span>↓ Down</span>
        <span>← Left</span>
        <span>→ Right</span>
        <span>↑ Up</span>
      </div>
      <canvas id="sheetCanvas" width="512" height="512"></canvas>
    </div>
    <div class="info">4× preview · actual size: 128×128</div>
    <div class="controls">
      <button onclick="downloadSheet()">📥 Download PNG (128×128)</button>
      <button onclick="downloadSheet4x()">📥 Download 4× (512×512)</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">ANIMATION PREVIEW</div>
    <canvas id="previewCanvas" width="192" height="192"></canvas>
    <div class="dir-buttons controls">
      <button id="btn-down" class="active" onclick="setDir(0)">↓</button>
      <button id="btn-left" onclick="setDir(1)">←</button>
      <button id="btn-right" onclick="setDir(2)">→</button>
      <button id="btn-up" onclick="setDir(3)">↑</button>
    </div>
    <div class="speed-control">
      <label>Speed:</label>
      <input type="range" min="80" max="400" value="200" id="speedSlider" oninput="updateSpeed()">
    </div>
  </div>
</div>

<script>
// ========================
// PALETTE
// ========================
const PALETTE = {
  0: null,
  1: '#E88030',   // orange main
  2: '#FFF0E0',   // cream/white
  3: '#2A1810',   // dark (eyes, nose)
  4: '#FFB0B0',   // pink (ears, cheeks)
  5: '#FFFFFF',   // highlight
  6: '#C06018',   // dark orange (shadow)
  7: '#F4A050',   // light orange
};

// ========================
// GRID UTILITIES
// ========================
function G() { return Array.from({length:32}, ()=> new Array(32).fill(0)); }

function R(g,x,y,w,h,c) {
  for(let dy=0;dy<h;dy++) for(let dx=0;dx<w;dx++)
    if(x+dx>=0&&x+dx<32&&y+dy>=0&&y+dy<32) g[y+dy][x+dx]=c;
}

function P(g,x,y,c) { if(x>=0&&x<32&&y>=0&&y<32) g[y][x]=c; }

function mirrorH(g) { return g.map(r=>[...r].reverse()); }

// ========================
// FOX: FRONT (DOWN)
// ========================
function foxDown(f) {
  const g = G();
  const b = (f===1||f===3)?1:0;

  // -- Tail peeking right --
  const ts = (f===1)?1:(f===3)?-1:0;
  R(g, 22+ts, 16+b, 3, 1, 1);
  R(g, 23+ts, 15+b, 3, 1, 1);
  R(g, 24+ts, 14+b, 3, 1, 1);
  P(g, 26+ts, 14+b, 2); P(g, 26+ts, 15+b, 2);

  // -- Left ear --
  P(g,10,2+b,1);
  R(g,9,3+b,3,1,1);
  R(g,8,4+b,4,1,1);
  R(g,8,5+b,5,1,1);
  P(g,10,3+b,4);
  P(g,9,4+b,4); P(g,10,4+b,4);
  P(g,9,5+b,4); P(g,10,5+b,4);

  // -- Right ear --
  P(g,21,2+b,1);
  R(g,20,3+b,3,1,1);
  R(g,20,4+b,4,1,1);
  R(g,19,5+b,5,1,1);
  P(g,21,3+b,4);
  P(g,21,4+b,4); P(g,22,4+b,4);
  P(g,21,5+b,4); P(g,22,5+b,4);

  // -- Head --
  R(g,9,6+b,14,1,1);
  R(g,8,7+b,16,1,1);
  R(g,7,8+b,18,1,1);
  R(g,7,9+b,18,1,1);
  R(g,7,10+b,18,1,1);
  R(g,7,11+b,18,1,1);
  R(g,8,12+b,16,1,1);
  R(g,9,13+b,14,1,1);
  R(g,10,14+b,12,1,1);

  // -- White face --
  R(g,12,7+b,8,1,2);
  R(g,11,8+b,10,1,2);
  R(g,10,9+b,12,1,2);
  R(g,10,10+b,12,1,2);
  R(g,10,11+b,12,1,2);
  R(g,11,12+b,10,1,2);
  R(g,12,13+b,8,1,2);

  // -- Eyes --
  R(g,12,9+b,2,2,3);
  R(g,18,9+b,2,2,3);
  P(g,12,9+b,5); P(g,18,9+b,5);

  // -- Nose --
  R(g,15,12+b,2,1,3);

  // -- Mouth --
  P(g,14,13+b,3); P(g,17,13+b,3);

  // -- Blush --
  P(g,10,11+b,4); P(g,21,11+b,4);

  // -- Body --
  R(g,10,15+b,12,1,1);
  R(g,10,16+b,12,1,1);
  R(g,9,17+b,14,1,1);
  R(g,9,18+b,14,1,1);
  R(g,9,19+b,14,1,1);
  R(g,10,20+b,12,1,1);
  R(g,10,21+b,12,1,1);

  // -- White belly --
  R(g,13,16+b,6,1,2);
  R(g,12,17+b,8,1,2);
  R(g,12,18+b,8,1,2);
  R(g,12,19+b,8,1,2);
  R(g,13,20+b,6,1,2);

  // -- Legs (close together, small stride) --
  const ly = 22+b;
  switch(f) {
    case 0:
      R(g,13,ly,3,4,1); R(g,13,ly+4,3,1,2);
      R(g,17,ly,3,4,1); R(g,17,ly+4,3,1,2);
      break;
    case 1:
      R(g,13,ly,3,4,1); R(g,13,ly+4,3,1,2);
      R(g,18,ly,3,3,1); R(g,18,ly+3,3,1,2);
      break;
    case 2:
      R(g,13,ly,3,4,1); R(g,13,ly+4,3,1,2);
      R(g,17,ly,3,4,1); R(g,17,ly+4,3,1,2);
      break;
    case 3:
      R(g,12,ly,3,3,1); R(g,12,ly+3,3,1,2);
      R(g,17,ly,3,4,1); R(g,17,ly+4,3,1,2);
      break;
  }
  return g;
}

// ========================
// FOX: BACK (UP)
// ========================
function foxUp(f) {
  const g = G();
  const b = (f===1||f===3)?1:0;
  const ts = (f===1)?1:(f===3)?-1:0;

  // -- Left ear --
  P(g,10,2+b,1);
  R(g,9,3+b,3,1,1);
  R(g,8,4+b,4,1,1);
  R(g,8,5+b,5,1,1);
  P(g,10,3+b,6); P(g,9,4+b,6); P(g,10,4+b,6);

  // -- Right ear --
  P(g,21,2+b,1);
  R(g,20,3+b,3,1,1);
  R(g,20,4+b,4,1,1);
  R(g,19,5+b,5,1,1);
  P(g,21,3+b,6); P(g,21,4+b,6); P(g,22,4+b,6);

  // -- Head (back, all orange) --
  R(g,9,6+b,14,1,1);
  R(g,8,7+b,16,1,1);
  R(g,7,8+b,18,1,1);
  R(g,7,9+b,18,1,1);
  R(g,7,10+b,18,1,1);
  R(g,7,11+b,18,1,1);
  R(g,8,12+b,16,1,1);
  R(g,9,13+b,14,1,1);
  R(g,10,14+b,12,1,1);
  // slight lighter patch on back of head
  R(g,12,8+b,8,1,7);
  R(g,11,9+b,10,1,7);

  // -- Body --
  R(g,10,15+b,12,1,1);
  R(g,10,16+b,12,1,1);
  R(g,9,17+b,14,1,1);
  R(g,9,18+b,14,1,1);
  R(g,9,19+b,14,1,1);
  R(g,10,20+b,12,1,1);
  R(g,10,21+b,12,1,1);

  // -- Big fluffy tail (centered, visible from behind) --
  R(g,12+ts,13+b,8,1,1);
  R(g,11+ts,14+b,10,1,1);
  R(g,11+ts,15+b,10,1,1);
  R(g,12+ts,16+b,8,1,1);
  R(g,13+ts,17+b,6,1,1);
  // tail white tip
  R(g,14+ts,13+b,4,1,2);
  R(g,13+ts,14+b,6,1,2);
  R(g,14+ts,15+b,4,1,2);

  // -- Legs (close together, small stride) --
  const ly = 22+b;
  switch(f) {
    case 0:
      R(g,13,ly,3,4,1); R(g,13,ly+4,3,1,2);
      R(g,17,ly,3,4,1); R(g,17,ly+4,3,1,2);
      break;
    case 1:
      R(g,12,ly,3,3,1); R(g,12,ly+3,3,1,2);
      R(g,17,ly,3,4,1); R(g,17,ly+4,3,1,2);
      break;
    case 2:
      R(g,13,ly,3,4,1); R(g,13,ly+4,3,1,2);
      R(g,17,ly,3,4,1); R(g,17,ly+4,3,1,2);
      break;
    case 3:
      R(g,13,ly,3,4,1); R(g,13,ly+4,3,1,2);
      R(g,18,ly,3,3,1); R(g,18,ly+3,3,1,2);
      break;
  }
  return g;
}

// ========================
// FOX: RIGHT
// ========================
function foxRight(f) {
  const g = G();
  const b = (f===1||f===3)?1:0;

  // -- Tail (extends left, slight upward curve) --
  const ts = (f===1)?-1:(f===3)?1:0;
  R(g, 7+ts, 17+b, 3, 1, 1);
  R(g, 5+ts, 16+b, 4, 1, 1);
  R(g, 3+ts, 15+b, 4, 1, 1);
  R(g, 2+ts, 14+b, 3, 1, 1);
  // white tip
  P(g, 2+ts, 14+b, 2); P(g, 3+ts, 14+b, 2);
  P(g, 3+ts, 15+b, 2);

  // -- Back ear (partially hidden) --
  P(g, 13, 2+b, 1);
  R(g, 12, 3+b, 3, 1, 1);
  R(g, 12, 4+b, 3, 1, 1);

  // -- Front ear --
  P(g, 19, 2+b, 1);
  R(g, 18, 3+b, 3, 1, 1);
  R(g, 17, 4+b, 4, 1, 1);
  R(g, 17, 5+b, 4, 1, 1);
  P(g, 19, 3+b, 4);
  P(g, 18, 4+b, 4); P(g, 19, 4+b, 4);
  P(g, 18, 5+b, 4); P(g, 19, 5+b, 4);

  // -- Head (profile, facing right) --
  R(g, 12, 6+b, 10, 1, 1);
  R(g, 11, 7+b, 12, 1, 1);
  R(g, 10, 8+b, 14, 1, 1);
  R(g, 10, 9+b, 14, 1, 1);
  R(g, 10, 10+b, 14, 1, 1);
  R(g, 10, 11+b, 13, 1, 1);
  R(g, 11, 12+b, 12, 1, 1);
  R(g, 12, 13+b, 10, 1, 1);
  R(g, 13, 14+b, 8, 1, 1);

  // snout extends right
  R(g, 23, 10+b, 2, 1, 2);
  R(g, 23, 11+b, 3, 1, 2);
  R(g, 23, 12+b, 2, 1, 2);
  P(g, 25, 11+b, 3); // nose at tip

  // -- White face marking (right half of face) --
  R(g, 17, 7+b, 6, 1, 2);
  R(g, 16, 8+b, 8, 1, 2);
  R(g, 16, 9+b, 8, 1, 2);
  R(g, 16, 10+b, 7, 1, 2);
  R(g, 16, 11+b, 7, 1, 2);
  R(g, 17, 12+b, 6, 1, 2);
  R(g, 18, 13+b, 4, 1, 2);

  // -- Eye --
  R(g, 19, 9+b, 2, 2, 3);
  P(g, 19, 9+b, 5);

  // -- Blush --
  P(g, 21, 11+b, 4);

  // -- Body (slimmer, centered under head) --
  R(g, 13, 15+b, 7, 1, 1);
  R(g, 12, 16+b, 8, 1, 1);
  R(g, 11, 17+b, 10, 1, 1);
  R(g, 11, 18+b, 10, 1, 1);
  R(g, 11, 19+b, 10, 1, 1);
  R(g, 12, 20+b, 8, 1, 1);
  R(g, 13, 21+b, 6, 1, 1);

  // -- White belly (front side) --
  R(g, 17, 16+b, 3, 1, 2);
  R(g, 17, 17+b, 3, 1, 2);
  R(g, 17, 18+b, 3, 1, 2);
  R(g, 17, 19+b, 2, 1, 2);

  // -- Legs (profile, subtle stride) --
  const ly = 22+b;
  switch(f) {
    case 0: // stand
      R(g, 13, ly, 3, 4, 1); R(g, 13, ly+4, 3, 1, 2);
      R(g, 17, ly, 3, 4, 1); R(g, 17, ly+4, 3, 1, 2);
      break;
    case 1: // front leg forward, back leg back
      R(g, 18, ly, 3, 3, 1); R(g, 18, ly+3, 3, 1, 2);
      R(g, 12, ly, 3, 4, 1); R(g, 12, ly+4, 3, 1, 2);
      break;
    case 2: // pass
      R(g, 14, ly, 3, 4, 1); R(g, 14, ly+4, 3, 1, 2);
      R(g, 16, ly, 3, 4, 1); R(g, 16, ly+4, 3, 1, 2);
      break;
    case 3: // front leg back, back leg forward
      R(g, 14, ly, 3, 4, 1); R(g, 14, ly+4, 3, 1, 2);
      R(g, 16, ly, 3, 3, 1); R(g, 16, ly+3, 3, 1, 2);
      break;
  }
  return g;
}

// ========================
// FOX: LEFT (mirror of right)
// ========================
function foxLeft(f) {
  return mirrorH(foxRight(f));
}

// ========================
// RENDER
// ========================
const allSprites = [];
const directions = [foxDown, foxLeft, foxRight, foxUp];

for (let d = 0; d < 4; d++) {
  allSprites[d] = [];
  for (let f = 0; f < 4; f++) {
    allSprites[d][f] = directions[d](f);
  }
}

// Draw sprite grid to canvas context
function drawGrid(ctx, grid, ox, oy, scale) {
  for (let y = 0; y < 32; y++) {
    for (let x = 0; x < 32; x++) {
      const c = grid[y][x];
      if (c && PALETTE[c]) {
        ctx.fillStyle = PALETTE[c];
        ctx.fillRect((ox + x) * scale, (oy + y) * scale, scale, scale);
      }
    }
  }
}

// Sheet canvas (4x scale)
const sheetCanvas = document.getElementById('sheetCanvas');
const sheetCtx = sheetCanvas.getContext('2d');

function renderSheet() {
  sheetCtx.clearRect(0, 0, 512, 512);

  for (let d = 0; d < 4; d++) {
    for (let f = 0; f < 4; f++) {
      drawGrid(sheetCtx, allSprites[d][f], f * 32, d * 32, 4);
    }
  }

  // Grid lines
  sheetCtx.strokeStyle = 'rgba(255,153,102,0.15)';
  sheetCtx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    sheetCtx.beginPath();
    sheetCtx.moveTo(i * 128, 0); sheetCtx.lineTo(i * 128, 512);
    sheetCtx.stroke();
    sheetCtx.beginPath();
    sheetCtx.moveTo(0, i * 128); sheetCtx.lineTo(512, i * 128);
    sheetCtx.stroke();
  }
}
renderSheet();

// ========================
// ANIMATION PREVIEW
// ========================
const prevCanvas = document.getElementById('previewCanvas');
const prevCtx = prevCanvas.getContext('2d');
let currentDir = 0;
let currentFrame = 0;
let animSpeed = 200;

function renderPreview() {
  prevCtx.clearRect(0, 0, 192, 192);
  drawGrid(prevCtx, allSprites[currentDir][currentFrame], 0, 0, 6);
}

function animLoop() {
  currentFrame = (currentFrame + 1) % 4;
  renderPreview();
  setTimeout(animLoop, animSpeed);
}
renderPreview();
setTimeout(animLoop, animSpeed);

function setDir(d) {
  currentDir = d;
  document.querySelectorAll('.dir-buttons button').forEach((b,i) => {
    b.classList.toggle('active', i === d);
  });
  renderPreview();
}

function updateSpeed() {
  animSpeed = 480 - parseInt(document.getElementById('speedSlider').value);
}

// ========================
// DOWNLOAD
// ========================
function downloadSheet() {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  for (let d = 0; d < 4; d++)
    for (let f = 0; f < 4; f++)
      drawGrid(ctx, allSprites[d][f], f*32, d*32, 1);
  const a = document.createElement('a');
  a.download = 'fox-sprite-32x32.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

function downloadSheet4x() {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  for (let d = 0; d < 4; d++)
    for (let f = 0; f < 4; f++)
      drawGrid(ctx, allSprites[d][f], f*32, d*32, 4);
  const a = document.createElement('a');
  a.download = 'fox-sprite-32x32-4x.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

// Keyboard direction control
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') setDir(0);
  else if (e.key === 'ArrowLeft') setDir(1);
  else if (e.key === 'ArrowRight') setDir(2);
  else if (e.key === 'ArrowUp') setDir(3);
});
</script>
</body>
</html>
