<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>暖爪小窝 Cozy Claw</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'Press Start 2P', monospace;
            color: #f0e6d3;
            image-rendering: pixelated;
        }
        #header { display: none; }
        #header h1 { font-size: 16px; color: #ffd700; text-shadow: 2px 2px 0 #8b6914; }
        #game-container {
            overflow: hidden;
            position: relative;
            width: 100vw; height: 100vh;
        }
        #status-bar {
            display: none;
        }
        .stat { display: flex; align-items: center; gap: 6px; }
        #hud-top {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 7px 14px;
            background: rgba(0, 0, 0, 0.5);
            font-family: 'Press Start 2P', monospace;
            font-size: 9px; color: #f0e6d3;
            z-index: 100; pointer-events: none;
        }
        #event-log {
            position: absolute; bottom: 8px; right: 8px;
            width: 280px;
            display: flex; flex-direction: column; justify-content: flex-end;
            z-index: 100; pointer-events: none;
            max-height: 150px; overflow: hidden;
        }
        .event-line {
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 8px; margin-top: 2px; border-radius: 3px;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px; color: #f0e6d3; line-height: 1.5;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        /* Indoor overlay styles */
        .indoor-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 200;
            background: #1a1a2e;
        }
        .indoor-overlay.active { display: block; }
        .indoor-overlay iframe {
            width: 100%; height: 100%; border: none;
        }
        .indoor-exit-btn {
            position: absolute; top: 10px; right: 10px;
            padding: 8px 16px;
            background: #8b6914; color: #f0e6d3;
            border: 3px solid #ffd700; border-radius: 4px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px; cursor: pointer;
            z-index: 210;
        }
        .indoor-exit-btn:hover { background: #a67c1a; }
        /* Door prompt */
        #door-prompt {
            position: absolute; bottom: 160px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 14px; border-radius: 4px;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px; color: #ffd700;
            z-index: 100; pointer-events: none;
            display: none;
        }
        /* Home overlay */
        #home-overlay {
            background: #2d5a27;
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 200;
            overflow: hidden;
        }
        #home-overlay.active { display: flex; align-items: center; justify-content: center; }
        #home-interior {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px; color: #ffd700;
            text-align: center;
            text-shadow: 2px 2px #000;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>
<body>
    <div id="header"><h1>暖爪小窝 Cozy Claw</h1></div>
    <div id="game-container">
        <!-- HUD overlay -->
        <div id="hud-top">
            <span id="hud-season">🌸 Spring</span>
            <span id="hud-day">Day 1</span>
        </div>
        <!-- Event log -->
        <div id="event-log"></div>
        <!-- Door prompt -->
        <div id="door-prompt">Press E to enter</div>
        <!-- Indoor overlays positioned inside game container -->
        <div id="indoor-overlay" class="indoor-overlay">
            <button class="indoor-exit-btn" onclick="exitIndoor('office')">Exit</button>
            <iframe id="office-iframe" src="about:blank"></iframe>
        </div>
        <div id="xiaoke-overlay" class="indoor-overlay">
            <button class="indoor-exit-btn" onclick="exitIndoor('xiaoke')" style="z-index:210;">Exit</button>
            <iframe id="xiaoke-iframe" src="about:blank" style="width:100%;height:100%;border:none;"></iframe>
        </div>
        <div id="home-overlay">
            <button class="indoor-exit-btn" onclick="exitIndoor('home')" style="z-index:10;">Exit</button>
            <div id="home-interior" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">
                <p>🏠 Home Sweet Home 🏠</p>
            </div>
        </div>
    </div>
    <div id="camera-controls" style="position:absolute;top:10px;left:10px;z-index:50;display:flex;gap:6px;">
        <button onclick="cameraZoom(1)" style="font-size:18px;width:36px;height:36px;background:rgba(0,0,0,0.6);color:#fff;border:2px solid #555;border-radius:6px;cursor:pointer;font-family:'Press Start 2P';">+</button>
        <button onclick="cameraZoom(-1)" style="font-size:18px;width:36px;height:36px;background:rgba(0,0,0,0.6);color:#fff;border:2px solid #555;border-radius:6px;cursor:pointer;font-family:'Press Start 2P';">-</button>
        <button onclick="cameraReset()" style="font-size:10px;height:36px;padding:0 10px;background:rgba(0,0,0,0.6);color:#fff;border:2px solid #555;border-radius:6px;cursor:pointer;font-family:'Press Start 2P';">⌂</button>
        <button id="mute-toggle" onclick="toggleMute()" style="font-size:10px;height:36px;padding:0 10px;background:rgba(0,0,0,0.6);color:#fff;border:2px solid #555;border-radius:6px;cursor:pointer;font-family:'Press Start 2P';">🔊</button>
        <button id="drag-toggle" onclick="toggleDrag()" style="font-size:10px;height:36px;padding:0 10px;background:rgba(0,0,0,0.6);color:#fff;border:2px solid #555;border-radius:6px;cursor:pointer;font-family:'Press Start 2P';">✋drag</button>
    </div>
    <div id="status-bar">
        <span class="stat" id="stat-season">Spring Day 1</span>
        <span class="stat" id="stat-conn">Offline</span>
    </div>

    <script>
    // === ASSET PATHS ===
    var PREMIUM_PACK = 'assets/Sprout%20Lands%20-%20Sprites%20-%20premium%20pack';
    var BASIC_PACK = 'assets/Sprout%20Lands%20-%20Sprites%20-%20Basic%20pack';

    var W = window.innerWidth, H = window.innerHeight;
    var MAP_W = 960, MAP_H = 1104; // 60*16 = 960, 69*16 = 1104
    var SCALE = 1; // Camera zoom handles magnification now, tiles render at 1x
    var CAMERA_ZOOM = 3; // Default zoom level
    var mapData = null;
    var ws = null;
    var indoorActive = null; // 'office' | 'home' | null

    var game = new Phaser.Game({
        type: Phaser.WEBGL, width: W, height: H,
        parent: 'game-container',
        backgroundColor: 0x1a1a1a,
        pixelArt: true,
        roundPixels: true,
        antialias: false,
        render: { antialiasGL: false, pixelArt: true, roundPixels: true },
        physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
        scene: { preload: preload, create: create, update: update },
        scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH }
    });

    // === PRELOAD ===
    function preload() {
        var scene = this;

        // Old map data (for character positions, cherry trees, well, picnic, chickens)
        scene.load.json('mapData', 'map.json');

        // Tiled tilemap JSON
        scene.load.tilemapTiledJSON('tiledMap', 'map_tiled.json');

        // Tileset images for the Tiled map
        scene.load.image('01_terrain_grass', 'assets/sprites/01_terrain_grass.png');
        scene.load.image('02_terrain_water', 'assets/sprites/02_terrain_water.png');
        scene.load.image('03_terrain_paths', 'assets/sprites/03_terrain_paths.png');
        scene.load.image('04_buildings', 'assets/sprites/04_buildings.png');
        scene.load.image('05_plants_trees', 'assets/sprites/05_plants_trees.png');
        scene.load.image('06_furniture', 'assets/sprites/06_furniture.png');
        scene.load.image('07_outdoor_decor', 'assets/sprites/07_outdoor_decor.png');
        scene.load.image('Chikcen_Houses', 'assets/sprites/Chikcen_Houses.png');
        scene.load.image('grey_brick_houses_with_grass', 'assets/sprites/grey_brick_houses_with_grass.png');
        scene.load.image('Soil_Ground_Tiles', 'assets/sprites/Soil_Ground_Tiles.png');
        scene.load.image('Wooden_Bridge_v2', 'assets/sprites/Wooden_Bridge_v2.png');
        scene.load.image('Bush_Tiles', 'assets/sprites/Bush_Tiles.png');
        scene.load.image('animal building', 'assets/sprites/Barn structures.png');
        scene.load.image('small_huts_with_grass', 'assets/sprites/small_huts_with_grass.png');
        scene.load.image('snow tiles 2', 'assets/sprites/snow tiles 2.png');
        scene.load.image('winter sprites', 'assets/sprites/winter sprites.png');
        scene.load.image('ice tiles', 'assets/sprites/ice tiles.png');

        // Chicken spritesheet
        scene.load.spritesheet('chicken', PREMIUM_PACK + '/Animals/Chicken/chicken%20default.png', { frameWidth: 16, frameHeight: 16 });

        // Cow spritesheet (32x32)
        scene.load.spritesheet('cowSprite', 'assets/Sprout%20Lands%20-%20Sprites%20-%20premium%20pack/Animals/Cow/Free%20Cow%20Sprites.png', { frameWidth: 32, frameHeight: 32 });

        // Character spritesheets
        scene.load.spritesheet('arkSprite', 'assets/characters/ark_48x48_spritesheet.png', { frameWidth: 48, frameHeight: 48 });
        scene.load.spritesheet('cookieSprite', 'assets/characters/Cookie_spritesheet.png', { frameWidth: 32, frameHeight: 32 });
        scene.load.spritesheet('mumuSprite', 'assets/characters/gemini_32x32_spritesheet.png', { frameWidth: 32, frameHeight: 32 });
        scene.load.spritesheet('heiheiSprite', 'assets/characters/heihei_cat_spritesheet.png', { frameWidth: 32, frameHeight: 32 });
        scene.load.spritesheet('huahuaSprite', 'assets/characters/tabby_cat_spritesheet.png', { frameWidth: 32, frameHeight: 32 });

        // NPCs - Rabbit character (48x48, 4 cols x 4 rows)
        scene.load.spritesheet('rabbitNPC', 'assets/Sprout%20Lands%20-%20Sprites%20-%20Basic%20pack/Characters/Basic%20Charakter%20Spritesheet.png', { frameWidth: 48, frameHeight: 48 });
        scene.load.spritesheet('npcPlayer', 'assets/characters/Player.png', { frameWidth: 32, frameHeight: 32 });
        scene.load.spritesheet('npcFPlayer', 'assets/characters/FPlayer%201%20walking.png', { frameWidth: 32, frameHeight: 32 });

        // Xiaoyu fox sprite (48x48, 6 cols x 4 rows: down/left/right/up)
        scene.load.spritesheet('xiaoyuSprite', 'assets/characters/xiaoyu_48x48_spritesheet.png', { frameWidth: 48, frameHeight: 48 });

        // Door animation spritesheet (old)
        scene.load.spritesheet('doorAnim', 'assets/sprites/door_animation.png', { frameWidth: 16, frameHeight: 32 });

        // Wooden door spritesheet (48x48, 8 frames) from Sprout Sorry pack
        scene.load.spritesheet('woodenDoor', 'assets/Sprout%20Sorry%20pack/Early%20Access/village%20pack/houses/wooden_door_spritesheet.png', { frameWidth: 48, frameHeight: 48 });

        // Farming Plants v2 (16x16, 7 cols x 33 rows) - use rows 1-14, first 4 frames each
        scene.load.spritesheet('cropSprite', 'assets/Sprout%20Sorry%20pack/Early%20Access/Plant%20update%202/Farming%20Plants%20v2.png', { frameWidth: 16, frameHeight: 16 });

        // Ocean Pack (Fish & Fishing)
        scene.load.spritesheet('smallFish', 'assets/Sprout%20Sorry%20pack/Early%20Access/Ocean%20Pack/small%20fish.png', { frameWidth: 16, frameHeight: 16 });
        scene.load.spritesheet('medFish', 'assets/Sprout%20Sorry%20pack/Early%20Access/Ocean%20Pack/mediuml%20fish.png', { frameWidth: 16, frameHeight: 16 });
        scene.load.spritesheet('fishingSide', 'assets/Sprout%20Sorry%20pack/Early%20Access/Ocean%20Pack/fishing%20animation%20side.png', { frameWidth: 48, frameHeight: 48 });

        // Snowflake sprite (16x16, 3 frames)
        scene.load.spritesheet('snowflake', 'assets/Sprout%20Sorry%20pack/Early%20Access/sprout%20winter/snomwflakes.png', { frameWidth: 16, frameHeight: 16 });

        // Sound effects
        scene.load.audio('sfx_door', 'assets/door_creak.mp3');           // Creaky wood door
        scene.load.audio('sfx_door_bing', 'assets/Sprout%20Sorry%20pack/Audio/bing_1.wav');  // Bing for enter
        scene.load.audio('sfx_npc_talk1', 'assets/Sprout%20Sorry%20pack/Audio/boo_1.wav');
        scene.load.audio('sfx_npc_talk2', 'assets/Sprout%20Sorry%20pack/Audio/boo_2.wav');
        scene.load.audio('sfx_walk1', 'assets/Sprout%20Sorry%20pack/Audio/squick_1.wav');
        scene.load.audio('sfx_walk2', 'assets/Sprout%20Sorry%20pack/Audio/squick_2.wav');
        scene.load.audio('sfx_kiss', 'assets/kiss_sound.mp3');            // Cute kiss sound
    }

    // === CREATE ===
    function create() {
        var scene = this;
        mapData = this.cache.json.get('mapData');
        var mc = mapData.mapConfig;

        // World bounds at 1x (camera zoom handles magnification)
        var worldW = 60 * 16; // 960
        var worldH = 69 * 16; // 1104
        this.physics.world.setBounds(0, 0, worldW, worldH);

        // --- Create animations ---
        createAnimations(this);

        // --- Collision group ---
        scene.obstacles = this.physics.add.staticGroup();

        // --- Tiled Tilemap ---
        var map = this.make.tilemap({ key: 'tiledMap' });
        var ts1 = map.addTilesetImage('01_terrain_grass', '01_terrain_grass');
        var ts2 = map.addTilesetImage('02_terrain_water', '02_terrain_water');
        var ts3 = map.addTilesetImage('03_terrain_paths', '03_terrain_paths');
        var ts4 = map.addTilesetImage('04_buildings', '04_buildings');
        var ts5 = map.addTilesetImage('05_plants_trees', '05_plants_trees');
        var ts6 = map.addTilesetImage('06_furniture', '06_furniture');
        var ts7 = map.addTilesetImage('07_outdoor_decor', '07_outdoor_decor');
        var ts8 = map.addTilesetImage('Chikcen_Houses', 'Chikcen_Houses');
        var ts9 = map.addTilesetImage('grey_brick_houses_with_grass', 'grey_brick_houses_with_grass');
        var ts10 = map.addTilesetImage('Soil_Ground_Tiles', 'Soil_Ground_Tiles');
        var ts11 = map.addTilesetImage('Wooden_Bridge_v2', 'Wooden_Bridge_v2');
        var ts12 = map.addTilesetImage('Bush_Tiles', 'Bush_Tiles');
        var ts13 = map.addTilesetImage('animal building', 'animal building');
        var ts14 = map.addTilesetImage('small_huts_with_grass', 'small_huts_with_grass');
        var ts15 = map.addTilesetImage('snow tiles 2', 'snow tiles 2');
        var ts16 = map.addTilesetImage('winter sprites', 'winter sprites');
        var ts17 = map.addTilesetImage('ice tiles', 'ice tiles');
        var allTilesets = [ts1, ts2, ts3, ts4, ts5, ts6, ts7, ts8, ts9, ts10, ts11, ts12, ts13, ts14, ts15, ts16, ts17];

        // Create tile layers at 1x (no setScale — camera zoom handles magnification)
        function initLayer(layer, depth) {
            if (!layer) return null;
            layer.setDepth(depth);
            return layer;
        }

        var groundLayer = initLayer(map.createLayer('Ground+river', allTilesets), -10);
        var beachLayer = initLayer(map.createLayer('beach + ground', allTilesets), -9);
        var ground2Layer = initLayer(map.createLayer('groud edge', allTilesets), -8);
        var hillLayer = initLayer(map.createLayer('hill', allTilesets), -7);
        var hill2Layer = initLayer(map.createLayer('hill 2 x', allTilesets), -6);
        var terrainLayer = initLayer(map.createLayer('Terrain x', allTilesets), -5);

        var pathLayer = initLayer(map.createLayer('path & bridge', allTilesets), -4);
        var treesLayer = initLayer(map.createLayer('Trees x', allTilesets), 400);
        var treeFurnitureLayer = initLayer(map.createLayer('trees and furniture x', allTilesets), 450);
        var decoPlantLayer = initLayer(map.createLayer('deco plant', allTilesets), -3); // Below player level

        var buildingsLayer = map.createLayer('Buildings+fence x', allTilesets);
        if (buildingsLayer) { buildingsLayer.setDepth(500); }

        var decorLayer = map.createLayer('Decorations', allTilesets);
        if (decorLayer) { decorLayer.setDepth(510); }
        if (decorLayer) { decorLayer.setDepth(500); }

        // Above Player layer renders on top of everything
        var aboveLayer = map.createLayer('Above Player', allTilesets);
        if (aboveLayer) { aboveLayer.setDepth(9000); }

        scene.tiledMap = map;
        scene.buildingsLayer = buildingsLayer;

        // --- Tile-based collision ---
        // Collision rule: layers with "x" in name have collision on all non-empty tiles
        // Plus water tiles (GID 540-719) on Ground+river layer have collision
        // Bridge tiles (3865-3876) override water collision
        var collisionLayers = ['hill 2 x', 'Terrain x', 'Trees x', 'trees and furniture x', 'Buildings+fence x'];
        var allLayerNames = ['Ground+river', 'beach + ground', 'groud edge', 'hill', 'hill 2 x', 'Terrain x', 'path & bridge', 'Trees x', 'trees and furniture x', 'deco plant', 'Buildings+fence x', 'Decorations'];

        // First pass: collect walkable override positions (bridges + paths)
        var bridgeTilePositions = {};
        // Wooden_Bridge_v2 tiles (3865-3876) on any layer
        allLayerNames.forEach(function(layerName) {
            var layer = map.getLayer(layerName);
            if (!layer) return;
            layer.data.forEach(function(row, y) {
                row.forEach(function(tile, x) {
                    if (!tile || tile.index <= 0) return;
                    if (tile.index >= 3865 && tile.index <= 3876) {
                        bridgeTilePositions[x + ',' + y] = true;
                    }
                });
            });
        });
        // ALL tiles on 'path & bridge' layer override collision (northern bridges use water-range GIDs)
        var pathBridgeLayer = map.getLayer('path & bridge');
        if (pathBridgeLayer) {
            pathBridgeLayer.data.forEach(function(row, y) {
                row.forEach(function(tile, x) {
                    if (!tile || tile.index <= 0) return;
                    bridgeTilePositions[x + ',' + y] = true;
                });
            });
        }
        console.log('Walkable override positions:', Object.keys(bridgeTilePositions).length);

        // Track which positions already have collision to avoid duplicates
        var collisionPositions = {};

        // Second pass: create collision from "x" layers
        collisionLayers.forEach(function(layerName) {
            var layer = map.getLayer(layerName);
            if (!layer) return;
            layer.data.forEach(function(row, y) {
                row.forEach(function(tile, x) {
                    if (!tile || tile.index <= 0) return;
                    var key = x + ',' + y;
                    if (bridgeTilePositions[key] || collisionPositions[key]) return;
                    collisionPositions[key] = true;
                    var px = x * 16 + 8;
                    var py = y * 16 + 8;
                    var block = scene.add.rectangle(px, py, 16, 16, 0xff0000, 0);
                    scene.physics.add.existing(block, true);
                    scene.obstacles.add(block);
                });
            });
        });

        // Third pass: water collision from Ground+river (GID 540-719)
        var waterLayer = map.getLayer('Ground+river');
        if (waterLayer) {
            waterLayer.data.forEach(function(row, y) {
                row.forEach(function(tile, x) {
                    if (!tile || tile.index <= 0) return;
                    var gid = tile.index;
                    if (gid >= 540 && gid <= 719) {
                        var key = x + ',' + y;
                        if (bridgeTilePositions[key] || collisionPositions[key]) return;
                        collisionPositions[key] = true;
                        var px = x * 16 + 8;
                        var py = y * 16 + 8;
                        var block = scene.add.rectangle(px, py, 16, 16, 0xff0000, 0);
                        scene.physics.add.existing(block, true);
                        scene.obstacles.add(block);
                    }
                });
            });
        }
        console.log('Total collision blocks:', Object.keys(collisionPositions).length);

        // --- Read markers from Tiled map (MUST be before any marker usage!) ---
        // Markers are at 1x coordinates (no SCALE multiplier — camera zoom handles it)
        var markers = {};
        map.objects.forEach(function(objectLayer) {
            objectLayer.objects.forEach(function(obj) {
                markers[obj.name] = { x: obj.x, y: obj.y, w: obj.width || 0, h: obj.height || 0 };
                console.log('Marker:', obj.name, 'x=', obj.x, 'y=', obj.y, 'w=', obj.width, 'h=', obj.height);
            });
        });

        // Spawn point from marker (use center of spawn area rectangle)
        var spawnX = 370;
        var spawnY = 812;
        if (markers['spawn area']) {
            spawnX = markers['spawn area'].x + (markers['spawn area'].w || 0) / 2;
            spawnY = markers['spawn area'].y + (markers['spawn area'].h || 0) / 2;
        } else if (markers['office']) {
            spawnX = markers['office'].x;
            spawnY = markers['office'].y;
        }
        console.log('Spawn at:', spawnX, spawnY);

        // --- Door zones ---
        // Home door - from marker 'home door' (with space!)
        var homeDoorPos = markers['home door'] || { x: 671, y: 731 };
        scene.pinkHouseDoorZone = scene.add.rectangle(homeDoorPos.x + 8, homeDoorPos.y + 9, 17, 18, 0x00ff00, 0);
        scene.physics.add.existing(scene.pinkHouseDoorZone, true);

        // Office door - use 'office' marker position (door is at bottom of building)
        var officeMarker = markers['office'] || { x: 371, y: 705 };
        scene.officeDoorZone = scene.add.rectangle(officeMarker.x + 29, officeMarker.y + 55, 30, 20, 0x0000ff, 0);
        scene.physics.add.existing(scene.officeDoorZone, true);

        // House doors in town (5 houses) - decorative door animations
        scene.houseDoors = [];
        ['house door 1', 'house door2', 'house door 3', 'house door 4', 'house door 5'].forEach(function(name) {
            var m = markers[name];
            if (!m) return;
            var zone = scene.add.rectangle(m.x + 7, m.y + 8, 14, 17, 0x00ff00, 0);
            scene.physics.add.existing(zone, true);
            scene.houseDoors.push({ zone: zone, name: name });
        });

        // --- Player (小玉 - Fox) ---
        // At 1x world coords; camera zoom 3x makes sprite appear ~2.5x
        scene.player = this.physics.add.sprite(spawnX, spawnY, 'xiaoyuSprite');
        scene.player.setScale(0.6);  // 48px * 0.6 ≈ 29px, similar to old 32*0.85
        scene.player.setCollideWorldBounds(true);
        scene.player.setBodySize(16, 18);
        scene.player.setOffset(16, 24);
        scene.player.setDepth(spawnY);
        scene.player.lastDir = 'down';
        scene.player.play('fox-idle-down');

        // Player label removed — was blurry at zoom
        scene.playerLabel = null;

        this.physics.add.collider(scene.player, scene.obstacles);

        // --- Animals ---
        // All coords at 1x (÷3 from old values)
        scene.animals = {};
        scene.animals.cookie = createAnimal(scene, 'cookieSprite', { x: spawnX - 27, y: spawnY + 20, roamRadius: 33, speed: 0.5 }, 'Cookie', '#ffd700');

    // === ANIMAL CREATION ===
    function createAnimal(scene, spriteKey, config, labelText, labelColor) {
        var sprite = scene.physics.add.sprite(config.x, config.y, spriteKey);
        var scale = config.scale || 0.67;
        sprite.setScale(scale);
        sprite.setCollideWorldBounds(true);
        sprite.setBodySize(config.bodyW || 20, config.bodyH || 16);
        sprite.setOffset(config.offsetX || 6, config.offsetY || 14);
        sprite.setDepth(config.y);

        // Labels removed — were blurry at zoom
        var label = null;

        return {
            sprite: sprite, label: label,
            homeX: config.x, homeY: config.y,
            targetX: config.x, targetY: config.y,
            roamRadius: config.roamRadius, speed: config.speed,
            nextMove: 0, state: 'idle'
        };
    }

    // === NPC INTERACTION ===
    function checkNPCInteractions(scene, time) {
        var px = scene.player.x, py = scene.player.y;

        // Ark - distance < 20 (was 60 at 3x) — kiss interaction!
        if (scene.animals.ark && time > scene.npcCooldowns.ark) {
            var as = scene.animals.ark.sprite;
            var d = Math.sqrt(Math.pow(px - as.x, 2) + Math.pow(py - as.y, 2));
            if (d < 20) {
                scene.npcCooldowns.ark = time + 15000;

                // Kiss sound disabled — sounded like sharpening knives 🔪

                // Kiss message variants
                var kissMessages = [

    // === UPDATE ===
    function update(time, delta) {
        var scene = this;
        if (!scene.player || !scene.player.active) return;

        if (indoorActive) {
            scene.player.setVelocity(0, 0);
            return;
        }

        // --- Player Movement --- (1x coords, ÷3 from old speed)
        var speed = 53;
        var vx = 0, vy = 0;
        if (scene.cursors.left.isDown || scene.wasd.A.isDown) vx = -speed;
        else if (scene.cursors.right.isDown || scene.wasd.D.isDown) vx = speed;
        if (scene.cursors.up.isDown || scene.wasd.W.isDown) vy = -speed;
        else if (scene.cursors.down.isDown || scene.wasd.S.isDown) vy = speed;

        if (vx !== 0 && vy !== 0) { vx *= 0.7071; vy *= 0.7071; }
        scene.player.setVelocity(vx, vy);

        var absX = Math.abs(vx), absY = Math.abs(vy);
        if (absX < 5 && absY < 5) {
            scene.player.play('fox-idle-' + scene.player.lastDir, true);
        } else if (absY > absX * 1.2) {
            if (vy < 0) { scene.player.play('fox-walk-up', true); scene.player.lastDir = 'up'; }
            else { scene.player.play('fox-walk-down', true); scene.player.lastDir = 'down'; }
        } else {
            if (vx < 0) { scene.player.play('fox-walk-left', true); scene.player.lastDir = 'left'; }
            else { scene.player.play('fox-walk-right', true); scene.player.lastDir = 'right'; }
        }

        // --- Walk sound effects ---
        if (scene.sfx && scene.sfx.walk) {
            var isMoving = (Math.abs(vx) > 5 || Math.abs(vy) > 5);
            if (isMoving && !scene.walkSfxPlaying) {
                scene.sfx.walk[scene.currentWalkSfx].play();
                scene.walkSfxPlaying = true;
            } else if (!isMoving && scene.walkSfxPlaying) {
                scene.sfx.walk[scene.currentWalkSfx].stop();
                scene.walkSfxPlaying = false;
                // Alternate between squick sounds
                scene.currentWalkSfx = (scene.currentWalkSfx + 1) % 2;
            }
        }

        scene.player.x = Math.round(scene.player.x);
        scene.player.y = Math.round(scene.player.y);
        scene.player.setDepth(scene.player.y + 11);
        if (scene.playerLabel) {
            scene.playerLabel.setPosition(scene.player.x, scene.player.y - 18);
            scene.playerLabel.setDepth(99999);
        }

        // --- Door proximity & enter ---
        var doorPrompt = document.getElementById('door-prompt');
        var nearAnyDoor = false;
        var doorType = null;

        // Check home door
        var activeDoorSprite = null;
        if (scene.pinkHouseDoorZone) {
            var dx = scene.player.x - scene.pinkHouseDoorZone.x;
            var dy = scene.player.y - scene.pinkHouseDoorZone.y;
            if (Math.sqrt(dx*dx + dy*dy) < 25) {
                nearAnyDoor = true; doorType = 'home'; activeDoorSprite = scene.homeDoorSprite;
            }
        }
        // Check office door
        if (scene.officeDoorZone && !nearAnyDoor) {
            var dx = scene.player.x - scene.officeDoorZone.x;
            var dy = scene.player.y - scene.officeDoorZone.y;
            if (Math.sqrt(dx*dx + dy*dy) < 30) {
                nearAnyDoor = true; doorType = 'office'; activeDoorSprite = scene.officeDoorSprite;
            }
        }
        // Check house doors in town
        if (!nearAnyDoor && scene.houseDoorSprites) {
            scene.houseDoorSprites.forEach(function(hd) {
                if (nearAnyDoor) return;
                var dx = scene.player.x - hd.zone.x;
                var dy = scene.player.y - hd.zone.y;
                if (Math.sqrt(dx*dx + dy*dy) < 22) {
                    nearAnyDoor = true; doorType = 'house'; activeDoorSprite = hd.sprite;
                }
            });
        }

        if (nearAnyDoor) {
            doorPrompt.style.display = 'block';
            doorPrompt.textContent = 'Press E to enter';
            if (Phaser.Input.Keyboard.JustDown(scene.eKey) && !scene.doorAnimPlaying) {
                scene.doorAnimPlaying = true;
                doorPrompt.style.display = 'none';
                if (scene.sfx && scene.sfx.door) scene.sfx.door.play();
                if (activeDoorSprite) {
                    activeDoorSprite.play('wooden-door-open');
                    activeDoorSprite.once('animationcomplete', function() {
                        if (scene.sfx && scene.sfx.doorBing) scene.sfx.doorBing.play();
                        scene.time.delayedCall(200, function() {
                            if (doorType === 'home' || doorType === 'office') enterIndoor(doorType);
                            else if (activeDoorSprite.doorTag === 'xiaoke') enterIndoor('xiaoke');
                            else addEvent('门锁着呢～ 🔒');
                            scene.time.delayedCall(500, function() {
                                activeDoorSprite.setFrame(0); // Back to closed
                                scene.doorAnimPlaying = false;
                            });
                        });
                    });
                }
            }
        } else {
            doorPrompt.style.display = 'none';
        }

        // --- Ark follows player ---
        if (scene.animals.ark) {
            scene.animals.ark.homeX = scene.player.x + 13;
            scene.animals.ark.homeY = scene.player.y + 7;
        }

        // --- Animal AI ---
        updateAnimalAI(scene, scene.animals.cookie, 'cookie', time);
        updateAnimalAI(scene, scene.animals.heihei, 'heihei', time);
        updateAnimalAI(scene, scene.animals.huahua, 'huahua', time);
        updateAnimalAI(scene, scene.animals.mumu, 'mumu', time);
        updateAnimalAI(scene, scene.animals.ark, 'ark', time);

        // --- NPC proximity interactions ---
        checkNPCInteractions(scene, time);

        // --- Cow AI ---
        if (scene.cowGroup) {
            scene.cowGroup.forEach(function(cow) {
                cow.setDepth(cow.y + 11);
                if (time > cow.nextAction) {
                    cow.nextAction = time + 3000 + Math.random() * 5000;
                    if (Math.random() > 0.4) {
                        var rect = cow.cowRect;
                        var tx = rect.x + 20 + Math.random() * (rect.w - 40);
                        var ty = rect.y + 20 + Math.random() * (rect.h - 40);
                        var dx = tx - cow.x, dy = ty - cow.y;
                        var d = Math.sqrt(dx*dx + dy*dy);
                        if (d > 5) { cow.setVelocity((dx/d)*cow.moveSpeed, (dy/d)*cow.moveSpeed); cow.play('cow-walk', true); cow.setFlipX(dx < 0); }
                    } else { cow.setVelocity(0, 0); cow.play('cow-idle', true); }
                }
                var cr2 = cow.cowRect;
                cow.x = Phaser.Math.Clamp(cow.x, cr2.x, cr2.x + cr2.w);
                cow.y = Phaser.Math.Clamp(cow.y, cr2.y, cr2.y + cr2.h);
            });
        }

        // --- NPC AI (rabbit town wanderers) ---
        if (scene.npcGroup) {
            scene.npcGroup.forEach(function(npc) {
                npc.setDepth(npc.y + 11);
                if (time > npc.nextAction) {
                    npc.nextAction = time + 3000 + Math.random() * 5000;
                    if (Math.random() > 0.35) {
                        var tr = npc.townRect;
                        var tx = tr.x + Math.random() * tr.w, ty = tr.y + Math.random() * tr.h;
                        var dx = tx - npc.x, dy = ty - npc.y;
                        var d = Math.sqrt(dx*dx + dy*dy);
                        if (d > 5) {
                            npc.setVelocity((dx/d)*npc.moveSpeed, (dy/d)*npc.moveSpeed);
                            if (Math.abs(dx) > Math.abs(dy)) {
                                npc.play(dx < 0 ? 'rabbit-walk-left' : 'rabbit-walk-right', true);
                            } else {
                                npc.play(dy < 0 ? 'rabbit-walk-up' : 'rabbit-walk-down', true);
                            }
                        }
                    } else { npc.setVelocity(0, 0); npc.play('rabbit-idle', true); }
                }
                var tr = npc.townRect;
                npc.x = Phaser.Math.Clamp(npc.x, tr.x, tr.x + tr.w);
                npc.y = Phaser.Math.Clamp(npc.y, tr.y, tr.y + tr.h);
            });
        }

        // --- Crop growth ---
        if (scene.cropSprites) {
            var now = Date.now();
            scene.cropSprites.forEach(function(crop) {
                if (crop.growthStage < crop.maxStage && now > crop.nextGrowth) {
                    crop.growthStage++;
                    crop.setFrame(crop.baseFrame + crop.growthStage);
                    crop.nextGrowth = now + 10000 + Math.random() * 5000;
                }
            });
        }

        // --- Chicken AI ---
        // Chickens stay inside the pen rectangle
        var cr = scene.chickenRect;
        scene.chickenGroup.forEach(function(chk) {
            chk.setDepth(chk.y + 167);

            // Soft boundary: gently steer back if near edge (no hard teleport)
            var margin = 7;
            var softZone = {
                x: cr.x + margin, y: cr.y + margin,
                w: cr.w - margin * 2, h: cr.h - margin * 2
            };
            var steerX = 0, steerY = 0;
            if (chk.x < softZone.x) steerX = chk.moveSpeed * 0.5;
            else if (chk.x > softZone.x + softZone.w) steerX = -chk.moveSpeed * 0.5;
            if (chk.y < softZone.y) steerY = chk.moveSpeed * 0.5;
            else if (chk.y > softZone.y + softZone.h) steerY = -chk.moveSpeed * 0.5;

            // Hard clamp: never escape pen entirely
            chk.x = Phaser.Math.Clamp(chk.x, cr.x, cr.x + cr.w);
            chk.y = Phaser.Math.Clamp(chk.y, cr.y, cr.y + cr.h);

            if (steerX !== 0 || steerY !== 0) {
                chk.setVelocity(steerX, steerY);
                chk.play('chick-walk', true);
                if (steerX !== 0) chk.setFlipX(steerX < 0);
                chk.nextAction = time + 1500;
            } else if (time > chk.nextAction) {
                var action = Math.random() > 0.4 ? 'walk' : 'idle';
                var duration = 2500 + Math.random() * 3000;
                chk.nextAction = time + duration;
                if (action === 'walk') {
                    // Random target inside soft zone
                    var targetX = softZone.x + Math.random() * softZone.w;
                    var targetY = softZone.y + Math.random() * softZone.h;
                    var tdx = targetX - chk.x;
                    var tdy = targetY - chk.y;
                    var td = Math.sqrt(tdx*tdx + tdy*tdy);
                    if (td > 5) {
                        chk.setVelocity((tdx/td) * chk.moveSpeed, (tdy/td) * chk.moveSpeed);
                    }
                    chk.play('chick-walk', true);
                    chk.setFlipX(chk.body.velocity.x < 0);
                } else {
                    chk.setVelocity(0, 0);
                    chk.play('chick-idle', true);
                }
            }
        });
    }

    function updateAnimalAI(scene, animal, name, time) {
        if (!animal) return;
        var s = animal.sprite;

        s.setDepth(s.y + 11);
        if (animal.label) {
            animal.label.setPosition(s.x, s.y - 8);
            animal.label.setDepth(99998);
        }

        if (time > animal.nextMove) {
            animal.nextMove = time + 2000 + Math.random() * 3000;
            if (Math.random() > 0.3) {
                var angle = Math.random() * Math.PI * 2;
                var dist = Math.random() * animal.roamRadius;
                animal.targetX = animal.homeX + Math.cos(angle) * dist;
                animal.targetY = animal.homeY + Math.sin(angle) * dist;
                animal.state = 'walk';
            } else {
                animal.state = 'idle';
                s.setVelocity(0, 0);
                if (name === 'cookie') s.play('cookie-idle', true);
                else if (name === 'mumu') s.play('mumu-idle', true);
                else if (name === 'heihei') s.play('heihei-idle', true);
                else if (name === 'huahua') s.play('huahua-idle', true);
                else if (name === 'ark') s.play('ark-idle-down', true);
            }
        }

        if (animal.state === 'walk') {
            var dx = animal.targetX - s.x;
            var dy = animal.targetY - s.y;
            var dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 3) {
                var spd = animal.speed * 60;
                var nx = (dx / dist) * spd;
                var ny = (dy / dist) * spd;
                s.setVelocity(nx, ny);

                if (name === 'cookie') {
                    if (Math.abs(dx) > Math.abs(dy)) s.play(dx < 0 ? 'cookie-left' : 'cookie-right', true);
                    else s.play(dy < 0 ? 'cookie-up' : 'cookie-down', true);
                } else if (name === 'mumu') {
                    if (Math.abs(dx) > Math.abs(dy)) s.play(dx < 0 ? 'mumu-left' : 'mumu-right', true);
                    else s.play(dy < 0 ? 'mumu-up' : 'mumu-down', true);
                } else if (name === 'heihei') {
                    s.play('heihei-walk', true); s.setFlipX(dx < 0);
                } else if (name === 'huahua') {
                    s.play('huahua-walk', true); s.setFlipX(dx < 0);
                } else if (name === 'ark') {
                    if (Math.abs(dx) > Math.abs(dy)) s.play(dx < 0 ? 'ark-walk-left' : 'ark-walk-right', true);
                    else s.play(dy < 0 ? 'ark-walk-up' : 'ark-walk-down', true);
                }
            } else {
                animal.state = 'idle';
                s.setVelocity(0, 0);
            }
        }
    }

        var z = cam.zoom * factor;

    }

    function connectWS() {

            ws = new WebSocket('ws://127.0.0.1:8080/ws');
            ws.onopen = function() { document.getElementById('stat-conn').textContent = 'Online'; };
            ws.onmessage = function(e) {
                try {
                    var gs = JSON.parse(e.data);
                    if (gs.season) {
                        document.getElementById('stat-season').textContent = gs.season + ' Day ' + (gs.day || 1);
                    }
                } catch(err) {}
            };
            ws.onclose = function() {
                document.getElementById('stat-conn').textContent = 'Offline';
                setTimeout(connectWS, 30000); // reconnect every 30s instead of 3s
            };
            ws.onerror = function() {};
        } catch(e) {}
    }

    </script>
</body>
</html>
